<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模擬テスト一覧</title>

  <style>
    body{
      margin:0;
      font-family:sans-serif;
      background:#f4f6f9;
    }

    header{
      background:#1e293b;
      color:white;
      padding:20px;
      text-align:center;
      font-size:28px;
      font-weight:bold;
    }
    
    .back-button{
         display:block;
        margin-left:auto;
    }

    .container{
      max-width:1100px;
      margin:auto;
      padding:20px;
    }

    .test-box{
      background:white;
      border-radius:16px;
      padding:20px;
      margin-bottom:30px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    h2{
      margin-top:0;
    }

    iframe{
      width:100%;
      height:700px;
      border:none;
      border-radius:10px;
    }

    .download{
      display:inline-block;
      margin-top:15px;
      padding:10px 18px;
      background:#2563eb;
      color:white;
      text-decoration:none;
      border-radius:8px;
      transition:0.2s;
    }

    .download:hover{
      background:#1d4ed8;
    }
  </style>
</head>
<body>

<header>
  模擬テストサイト
</header>

<div class="container">

  <!-- 模試1 -->
  <div class="test-box">
    <h2>社会 模擬テスト</h2>

    <button class="back-button">戻る</button>

    <iframe src="meiji_history_comprehensive_test_v2.pdf"></iframe>

    <a class="download" href="meiji_history_comprehensive_test_v2.pdf" target="_blank">
      PDFを開く
    </a>
  </div>

  <!-- 模試2 -->
  <div class="test-box">
    <h2>理科 模擬テスト</h2>

    <iframe src="science_fixed_exam.pdf"></iframe>

    <a class="download" href="science_fixed_exam.pdf" target="_blank">
      PDFを開く
    </a>
  </div>

  <div class="test-box">
    <h2>英語 模擬テスト</h2>

    <iframe src="English_Grammar_and_Reading_Test.pdf"></iframe>

    <a class="download" href="English_Grammar_and_Reading_Test.pdf" target="_blank">
        PDFを開く
    </a>
  </div>

</div>

</body>
</html>
