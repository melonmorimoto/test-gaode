<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>テレポート</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:sans-serif;
    }

    body{
      background:#111827;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px;
    }

    .container{
      width:100%;
      max-width:900px;
    }

    h1{
      text-align:center;
      margin-bottom:30px;
      font-size:2.5rem;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
    }

    button{
      padding:25px;
      border:none;
      border-radius:20px;
      background:linear-gradient(135deg,#2563eb,#7c3aed);
      color:white;
      font-size:1.1rem;
      cursor:pointer;
      transition:0.2s;
      box-shadow:0 5px 15px rgba(0,0,0,0.3);
    }

    button:hover{
      transform:translateY(-5px) scale(1.02);
    }

    button:active{
      transform:scale(0.98);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>テレポーター</h1>

    <div class="grid">

      <!-- ボタン1 -->
      <button onclick="location.href='index.html'">
        ここ
      </button>

      <!-- ボタン2 -->
      <button onclick="location.href='social-3rd-1,middle.html'">
        社会
      </button>

      <!-- ボタン3 -->
      <button onclick="location.href='english-3rd-1,middle.html'">
        英語
      </button>

      <!-- ボタン4 -->
      <button onclick="location.href='science-3rd-1,middle.html'">
        理科
      </button>

      <p>これは中学３年生一学期中間の内容です。</p>

    </div>
  </div>

</body>
</html>
